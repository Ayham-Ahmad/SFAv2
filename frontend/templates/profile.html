{% extends "base.html" %}
{% block title %}My Profile{% endblock %}
{% block page_title %}My Profile{% endblock %}

{% block content %}
<div style="max-width:620px">

  <!-- Profile card -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-header">
      <div>
        <div class="card-title">Account Details</div>
        <div class="card-sub">Update your username and email.</div>
      </div>
      <div class="user-avatar" id="profile-avatar" style="width:44px;height:44px;font-size:16px">U</div>
    </div>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-control" id="p-username" placeholder="your_username">
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-control" type="email" id="p-email" placeholder="you@company.com">
    </div>
    <div class="form-group">
      <label class="form-label">Role</label>
      <input class="form-control" id="p-role" disabled style="opacity:.5">
    </div>
    <button class="btn btn-primary btn-sm" onclick="saveProfile()">Save Changes</button>
  </div>

  <!-- Change password card -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-header">
      <div class="card-title">Change Password</div>
    </div>
    <div class="form-group">
      <label class="form-label">Current Password</label>
      <input class="form-control" type="password" id="pw-current" placeholder="••••••••">
    </div>
    <div class="form-group">
      <label class="form-label">New Password</label>
      <input class="form-control" type="password" id="pw-new" placeholder="••••••••">
    </div>
    <div class="form-group">
      <label class="form-label">Confirm New Password</label>
      <input class="form-control" type="password" id="pw-confirm" placeholder="••••••••">
    </div>
    <button class="btn btn-primary btn-sm" onclick="changePassword()">Update Password</button>
  </div>

  <!-- UI preferences -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">Preferences</div>
    </div>
    <div class="form-group">
      <label class="form-label">Theme</label>
      <select class="form-control" id="pref-theme" style="width:200px">
        <option value="dark">Dark</option>
        <option value="white">Light</option>
        <option value="auto">System Default</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Language</label>
      <select class="form-control" id="pref-lang" style="width:200px">
        <option value="en">English</option>
      </select>
    </div>
    <button class="btn btn-primary btn-sm" onclick="savePrefs()">Save Preferences</button>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    if (!Auth.requireAuth()) return;
    const res = await API.get('/api/users/me');
    if (!res?.ok) return;
    const u = res.data;
    document.getElementById('p-username').value = u.username || '';
    document.getElementById('p-email').value = u.email || '';
    document.getElementById('p-role').value = u.role || '';
    document.getElementById('profile-avatar').textContent = (u.username?.[0] || 'U').toUpperCase();
    if (u.ui_prefs) {
      document.getElementById('pref-theme').value = u.ui_prefs.theme || 'dark';
      document.getElementById('pref-lang').value = u.ui_prefs.language || 'en';
    }
  });

  async function saveProfile() {
    const body = { username: document.getElementById('p-username').value.trim(), email: document.getElementById('p-email').value.trim() };
    if (!body.username || !body.email) { Toast.error('Username and email are required.'); return; }
    const res = await API.patch('/api/users/me', body);
    if (res?.ok) {
      const stored = Auth.getUser();
      Auth.save(Auth.getToken(), { ...stored, username: body.username, email: body.email });
      Auth.hydrateSidebar();
      Toast.success('Profile updated.');
    } else Toast.error(res?.data?.detail || 'Update failed.');
  }

  async function changePassword() {
    const cur = document.getElementById('pw-current').value;
    const nw = document.getElementById('pw-new').value;
    const conf = document.getElementById('pw-confirm').value;
    if (!cur || !nw || !conf) { Toast.error('All password fields are required.'); return; }
    if (nw !== conf) { Toast.error('New passwords do not match.'); return; }
    if (nw.length < 6) { Toast.error('Password must be at least 6 characters.'); return; }
    const res = await API.post('/api/auth/change-password', { current_password: cur, new_password: nw });
    if (res?.ok) {
      ['pw-current', 'pw-new', 'pw-confirm'].forEach(id => document.getElementById(id).value = '');
      Toast.success('Password changed successfully.');
    } else Toast.error(res?.data?.detail || 'Password change failed.');
  }

  async function savePrefs() {
    const body = { ui_prefs: { theme: document.getElementById('pref-theme').value, language: document.getElementById('pref-lang').value } };
    const res = await API.patch('/api/users/me', body);
    if (res?.ok) Toast.success('Preferences saved.');
    else Toast.error(res?.data?.detail || 'Save failed.');
  }
</script>
{% endblock %}
