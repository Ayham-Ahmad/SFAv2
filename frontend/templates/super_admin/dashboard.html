{% extends "base.html" %}

{% block sheet %}
<link rel="stylesheet" href="/static/css/dashboard.css">
{% endblock %}

{% block main %}

<div class="container">
    <div class="row g-4">

        <div class="col">
            <div class="card">
                <div class="card-title">Cost</div>
                <div class="card-text" id="cost_card"></div>
            </div>
        </div>

        <div class="col">
            <div class="card">
                <div class="card-title">Active Users</div>
                <div class="card-text" id="users_card"></div>
            </div>
        </div>

        <div class="col">
            <div class="card">
                <div class="card-title">Companies</div>
                <div class="card-text" id="companies_card"></div>
            </div>
        </div>

        <div class="col">
            <div class="card">
                <div class="card-title">Active Databases</div>
                <div class="card-text" id="databases_card"></div>
            </div>
        </div>

        <div class="col">
            <div class="card">
                <div class="card-title">Interactions</div>
                <div class="card-text" id="interactions_card"></div>
            </div>
        </div>

    </div>
</div>

{% endblock %}

{% block script %}
<script src="/static/js/dashboard.js"></script>
{% endblock %}
