{% extends "base.html" %}
{% block title %}All Users{% endblock %}
{% block page_title %}All Users{% endblock %}

{% block content %}
<div class="flex items-center gap-3" style="margin-bottom:16px">
  <div class="search-wrap" style="width:280px">
    <i class="fas fa-search"></i>
    <input class="form-control" id="search-users" placeholder="Search users…">
  </div>
</div>

<div class="table-wrap">
  <table id="tbl-users">
    <thead><tr><th>Username</th><th>Email</th><th>Role</th><th>Company</th><th>Status</th><th>Last Login</th><th>Created</th></tr></thead>
    <tbody id="tbody-users"><tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted)"><div class="spinner" style="margin:auto"></div></td></tr></tbody>
  </table>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', async () => {
  if (!Auth.requireAuth() || !Auth.requireRole('superadmin')) return;
  Table.searchFilter('search-users','tbl-users');
  const res = await API.get('/api/super-admin/company-admins');
  const rows = res?.data || [];
  const tbody = document.getElementById('tbody-users');
  tbody.innerHTML = rows.map(u => `
    <tr>
      <td><strong>${u.username}</strong></td>
      <td class="td-mono">${u.email}</td>
      <td><span class="badge badge-violet">${u.role}</span></td>
      <td>${u.company_id || '—'}</td>
      <td><span class="badge ${u.is_active?'badge-emerald':'badge-rose'}">${u.is_active?'Active':'Inactive'}</span></td>
      <td class="td-mono">${u.last_login ? new Date(u.last_login).toLocaleDateString() : 'Never'}</td>
      <td class="td-mono">${new Date(u.user_created_at).toLocaleDateString()}</td>
    </tr>`).join('') || '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:40px">No users found</td></tr>';
});
</script>
{% endblock %}
