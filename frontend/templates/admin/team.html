{% extends "base.html" %}
{% block title %}Team{% endblock %}
{% block page_title %}Team Management{% endblock %}

{% block topbar_actions %}
<button class="btn btn-primary btn-sm" onclick="Modal.open('modal-invite')">
  <i class="fas fa-user-plus"></i> Invite Member
</button>
{% endblock %}

{% block content %}
<div class="flex items-center gap-3" style="margin-bottom:16px">
  <div class="search-wrap" style="width:280px">
    <i class="fas fa-search"></i>
    <input class="form-control" id="search-team" placeholder="Search team…">
  </div>
</div>

<div class="table-wrap">
  <table id="tbl-team">
    <thead><tr><th>Member</th><th>Email</th><th>Role</th><th>Status</th><th>Last Login</th><th>Joined</th><th></th></tr></thead>
    <tbody id="tbody-team"><tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted)"><div class="spinner" style="margin:auto"></div></td></tr></tbody>
  </table>
</div>

<!-- Invite modal -->
<div class="modal-overlay" id="modal-invite">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Invite Team Member</span><button class="modal-close">×</button></div>
    <div class="form-group"><label class="form-label">Username</label><input class="form-control" id="inv-username" placeholder="jane_smith"></div>
    <div class="form-group"><label class="form-label">Email</label><input class="form-control" type="email" id="inv-email" placeholder="jane@company.com"></div>
    <div class="form-group"><label class="form-label">Temporary Password</label><input class="form-control" type="password" id="inv-pass" placeholder="••••••••"></div>
    <div class="form-group"><label class="form-label">Role</label>
      <select class="form-control" id="inv-role"><option value="manager">Manager</option></select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.close('modal-invite')">Cancel</button>
      <button class="btn btn-primary" onclick="inviteMember()">Send Invite</button>
    </div>
  </div>
</div>

<!-- Edit modal -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Edit Member</span><button class="modal-close">×</button></div>
    <input type="hidden" id="edit-user-id">
    <div class="form-group"><label class="form-label">Username</label><input class="form-control" id="edit-username"></div>
    <div class="form-group"><label class="form-label">Email</label><input class="form-control" type="email" id="edit-email"></div>
    <div class="form-group"><label class="form-label">Status</label>
      <select class="form-control" id="edit-active"><option value="true">Active</option><option value="false">Inactive</option></select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.close('modal-edit')">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', async () => {
  if (!Auth.requireAuth() || !Auth.requireRole('admin','superadmin')) return;
  Table.searchFilter('search-team','tbl-team');
  loadTeam();
});

async function loadTeam() {
  const res = await API.get('/api/admin/users');
  const users = res?.data || [];
  const me = Auth.getUser();
  const tbody = document.getElementById('tbody-team');
  tbody.innerHTML = users.map(u => `
    <tr>
      <td><strong>${u.username}</strong>${u.user_id==me?.user_id?' <span class="badge badge-blue" style="font-size:10px">You</span>':''}</td>
      <td class="td-mono">${u.email}</td>
      <td><span class="badge badge-muted">${u.role}</span></td>
      <td><span class="badge ${u.is_active?'badge-emerald':'badge-rose'}">${u.is_active?'Active':'Inactive'}</span></td>
      <td class="td-mono">${u.last_login?new Date(u.last_login).toLocaleDateString():'Never'}</td>
      <td class="td-mono">${new Date(u.user_created_at).toLocaleDateString()}</td>
      <td class="flex gap-2">
        <button class="btn btn-ghost btn-sm" onclick='openEdit(${JSON.stringify(u)})'><i class="fas fa-pen"></i></button>
        ${u.user_id!=me?.user_id?`<button class="btn btn-danger btn-sm" onclick="removeMember(${u.user_id},'${u.username}')"><i class="fas fa-trash"></i></button>`:''}
      </td>
    </tr>`).join('') || '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:40px">No team members</td></tr>';
}

async function inviteMember() {
  const body = { username:document.getElementById('inv-username').value.trim(), email:document.getElementById('inv-email').value.trim(), password:document.getElementById('inv-pass').value, role:document.getElementById('inv-role').value };
  if (!body.username||!body.email||!body.password) { Toast.error('All fields required.'); return; }
  const res = await API.post('/api/admin/users', body);
  if (res?.ok) { Modal.close('modal-invite'); Toast.success('Member added.'); loadTeam(); }
  else Toast.error(res?.data?.detail || 'Failed to add member.');
}

function openEdit(u) {
  document.getElementById('edit-user-id').value  = u.user_id;
  document.getElementById('edit-username').value = u.username;
  document.getElementById('edit-email').value    = u.email;
  document.getElementById('edit-active').value   = String(u.is_active);
  Modal.open('modal-edit');
}

async function saveEdit() {
  const id   = document.getElementById('edit-user-id').value;
  const body = { username:document.getElementById('edit-username').value, email:document.getElementById('edit-email').value, is_active:document.getElementById('edit-active').value==='true' };
  const res  = await API.patch(`/api/admin/users/${id}`, body);
  if (res?.ok) { Modal.close('modal-edit'); Toast.success('Updated.'); loadTeam(); }
  else Toast.error(res?.data?.detail || 'Update failed.');
}

function removeMember(id, name) {
  confirmAction(`Remove ${name} from the team?`, async () => {
    const res = await API.delete(`/api/admin/users/${id}`);
    if (res?.ok) { Toast.success('Member removed.'); loadTeam(); }
    else Toast.error(res?.data?.detail || 'Failed.');
  });
}
</script>
{% endblock %}
